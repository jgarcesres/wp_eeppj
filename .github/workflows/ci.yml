name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Tier 1a: PHP 7.4 syntax lint ───
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: PHP 7.4 syntax check
        uses: docker://php:7.4-cli
        with:
          entrypoint: /bin/sh
          args: >
            -c "
            find wp-content -name '*.php' -print0 |
            xargs -0 -n1 -P$(nproc) php -l 2>&1 |
            tee /tmp/lint.log &&
            ! grep -q 'Parse error' /tmp/lint.log
            "

  # ─── Tier 1a-ii: Version consistency ───
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency across components
        run: |
          FAIL=0

          # PQRRS: header Version must match EEPPJ_PQRRS_VERSION constant
          PQRRS_HDR=$(grep -oP "Version:\s*\K[0-9.]+" wp-content/plugins/eeppj-pqrrs/eeppj-pqrrs.php)
          PQRRS_DEF=$(grep -oP "EEPPJ_PQRRS_VERSION',\s*'\K[0-9.]+" wp-content/plugins/eeppj-pqrrs/eeppj-pqrrs.php)
          if [ "$PQRRS_HDR" != "$PQRRS_DEF" ]; then
            echo "::error::PQRRS header Version ($PQRRS_HDR) ≠ EEPPJ_PQRRS_VERSION ($PQRRS_DEF)"
            FAIL=1
          else
            echo "✓ PQRRS: $PQRRS_HDR"
          fi

          # Carousel: header Version must match EEPPJ_CAROUSEL_VERSION constant
          CARO_HDR=$(grep -oP "Version:\s*\K[0-9.]+" wp-content/plugins/eeppj-carousel/eeppj-carousel.php)
          CARO_DEF=$(grep -oP "EEPPJ_CAROUSEL_VERSION',\s*'\K[0-9.]+" wp-content/plugins/eeppj-carousel/eeppj-carousel.php)
          if [ "$CARO_HDR" != "$CARO_DEF" ]; then
            echo "::error::Carousel header Version ($CARO_HDR) ≠ EEPPJ_CAROUSEL_VERSION ($CARO_DEF)"
            FAIL=1
          else
            echo "✓ Carousel: $CARO_HDR"
          fi

          # Theme: just report (no constant to cross-check)
          THEME_VER=$(grep -oP 'Version:\s*\K[0-9.]+' wp-content/themes/eeppj/style.css)
          echo "✓ Theme: $THEME_VER"

          exit $FAIL

  # ─── Tier 1b + 2: Smoke test + Visual regression ───
  smoke-and-visual:
    runs-on: ubuntu-latest
    needs: [lint, version-check]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start wp-env
        run: npx wp-env start

      - name: Seed WordPress content
        run: bash tests/setup-wp.sh

      - name: Smoke test — assert no 500s
        run: bash tests/smoke.sh

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Visual regression screenshots
        run: npx playwright test tests/visual.spec.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-screenshots
          path: tests/screenshots/
          retention-days: 30

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop

  # ─── Tier 3 (stretch): Functional E2E ───
  e2e:
    runs-on: ubuntu-latest
    needs: smoke-and-visual
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start wp-env
        run: npx wp-env start

      - name: Seed WordPress content
        run: bash tests/setup-wp.sh

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Functional E2E tests
        run: npx playwright test tests/e2e.spec.js

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: test-results/
          retention-days: 14

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
